<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xgplayer-subtitles demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f7fb;
        color: #1f2937;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .subtitle-demo {
        width: min(1180px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .demo-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 24px;
        margin-bottom: 20px;
      }

      .demo-title {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.2;
      }

      .demo-description {
        margin: 0;
        color: #64748b;
        font-size: 14px;
      }

      .source-link {
        color: #2563eb;
        font-size: 13px;
        text-decoration: none;
      }

      .source-link:hover {
        text-decoration: underline;
      }

      .media-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 16px;
        align-items: stretch;
      }

      .player-shell,
      .timeline-panel {
        overflow: hidden;
        border: 1px solid #d8dee9;
        border-radius: 8px;
      }

      .player-shell {
        background: #0f172a;
      }

      #video0 {
        min-height: 620px;
      }

      .timeline-panel {
        display: flex;
        min-height: 620px;
        max-height: 620px;
        flex-direction: column;
        background: #fff;
      }

      .timeline-header {
        border-bottom: 1px solid #e2e8f0;
        padding: 16px 16px 12px;
      }

      .timeline-title {
        margin: 0;
        color: #334155;
        font-size: 13px;
        font-weight: 600;
      }

      .timeline-list {
        display: grid;
        align-content: start;
        gap: 8px;
        overflow: auto;
        padding: 12px;
      }

      .timeline-time {
        color: #64748b;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.35;
      }

      .timeline-text {
        color: #334155;
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .timeline-empty {
        margin: 0;
        color: #64748b;
        font-size: 12px;
      }

      .control-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
        margin-top: 16px;
      }

      .controls,
      .status-panel {
        background: #fff;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        padding: 16px;
      }

      .controls {
        display: grid;
        align-content: start;
        gap: 16px;
      }

      .section-title {
        margin: 0 0 12px;
        color: #334155;
        font-size: 13px;
        font-weight: 600;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        height: 34px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        color: #334155;
        cursor: pointer;
        font-size: 13px;
        padding: 0 12px;
      }

      button:hover {
        border-color: #2563eb;
        color: #1d4ed8;
      }

      button.is-active {
        border-color: #2563eb;
        background: #eff6ff;
        color: #1d4ed8;
        font-weight: 600;
      }

      .timeline-item {
        display: grid;
        width: 100%;
        height: auto;
        min-height: 72px;
        grid-template-columns: 68px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        border-color: #e2e8f0;
        padding: 10px;
        text-align: left;
        white-space: pre-wrap;
      }

      .timeline-item.is-active {
        border-color: #2563eb;
        background: #eff6ff;
      }

      .status-list {
        display: grid;
        gap: 10px;
        margin: 0;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status-row dt {
        color: #64748b;
        font-size: 12px;
      }

      .status-row dd {
        margin: 0;
        color: #0f172a;
        font-size: 13px;
        text-align: right;
      }

      .status-row .is-danger {
        color: #b91c1c;
        font-weight: 600;
      }

      .event-log {
        min-height: 88px;
        margin: 14px 0 0;
        padding: 10px 10px 10px 24px;
        background: #f8fafc;
        border-radius: 6px;
        color: #475569;
        font-size: 12px;
      }

      .event-log li + li {
        margin-top: 6px;
      }

      @media (max-width: 860px) {
        .subtitle-demo {
          width: calc(100vw - 24px);
          padding: 16px 0;
        }

        .demo-header {
          align-items: flex-start;
        }

        .control-panel {
          grid-template-columns: 1fr;
        }

        .media-panel {
          grid-template-columns: 1fr;
        }

        #video0 {
          min-height: 420px;
        }

        .timeline-panel {
          min-height: 260px;
          max-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <main class="subtitle-demo">
      <header class="demo-header">
        <div>
          <h1 class="demo-title">xgplayer-subtitles demo</h1>
          <p class="demo-description">External WebVTT, ASS, JSON, and dedicated XSS subtitle track examples.</p>
        </div>
        <a
          class="source-link"
          href="https://cesium.com/public/SandcastleSampleData/big-buck-bunny_trailer.mp4"
          target="_blank"
          rel="noreferrer"
        >
          Video source
        </a>
      </header>

      <section class="media-panel" aria-label="Video player and subtitle timeline">
        <div class="player-shell" aria-label="Video player">
          <div id="video0"></div>
        </div>
        <aside class="timeline-panel" aria-label="Subtitle timeline">
          <header class="timeline-header">
            <h2 class="timeline-title">Timeline</h2>
          </header>
          <div class="timeline-list" id="timelineList"></div>
        </aside>
      </section>

      <section class="control-panel" aria-label="Subtitle controls">
        <div class="controls">
          <div>
            <h2 class="section-title">Tracks</h2>
            <div class="button-row" id="trackControls" aria-label="Subtitle tracks"></div>
          </div>
          <div>
            <h2 class="section-title">Actions</h2>
            <div class="button-row" aria-label="Subtitle actions">
              <button type="button" id="toggleSubtitle">关闭字幕</button>
              <button type="button" id="resetDemo">Reset</button>
            </div>
          </div>
        </div>

        <aside class="status-panel" aria-label="Playback status">
          <h2 class="section-title">Status</h2>
          <dl class="status-list">
            <div class="status-row">
              <dt>Track</dt>
              <dd id="activeTrack">-</dd>
            </div>
            <div class="status-row">
              <dt>Case</dt>
              <dd id="currentCase">-</dd>
            </div>
            <div class="status-row">
              <dt>Playback</dt>
              <dd id="playbackState">-</dd>
            </div>
            <div class="status-row">
              <dt>XSS</dt>
              <dd id="xssState">-</dd>
            </div>
          </dl>
          <ol class="event-log" id="eventLog"></ol>
        </aside>
      </section>
    </main>

    <script type="module" defer src="./index.js"></script>
  </body>
</html>
